{% extends 'main.html' %}

{% block content %}
    <style>
        input{
            width: 300px;
        }
        label{
            width: 120px;
            background-color: #ffc0cb35;
            border-radius: 5px;
        }
    </style>

    <h2>Login Page</h2>
    <br><br>
    
    <form method="POST" class="form-slide" style="margin-top: 50px;">
        {% csrf_token %}
        <label for="">Usename:</label>
        <input type="text" name="username" placeholder="Username" required> <br><br>
        <label for="">Password:</label>
        <input type="password" name="password" placeholder="Password" required> 
        <br><br>

        <button type="submit">Sign in</button>

    </form>
    <br>
    <p>Don't have an account -> <a href="{% url 'signup' %}" style="font-size: large;">Register</a></p>

{% endblock %}
