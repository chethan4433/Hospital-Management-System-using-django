{% extends 'main.html' %}

{% block content %}
    <style>
        input{
            width: 320px;
        }
        label{
            width: 180px;
            background-color: #ffc0cb35;
            border-radius: 5px;
        }
    </style>

    <h2>Update Password</h2>
    <br>
    <a href="{% url 'profile' %}"><button style="padding: 3px 5px;">Cancel</button></a>
    <form method="POST" style="margin-top: 50px;" class="form-slide">
        {% csrf_token %}
        <label for="">Old password:</label>
        <input type="text" name="old_password" placeholder="Old password" required> <br><br>
        <label for="">New password:</label>
        <input type="text" name="new_password" placeholder="New password" required> <br><br>
        <label for="">Confirm password:</label>
        <input type="text" name="confirm_password" placeholder="Confirm password" required> <br><br>
        

        <button type="submit">Save</button>
    </form>
    <br>
    

{% endblock %}
